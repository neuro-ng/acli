name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl cross-compiler and aarch64 Linux linker
      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq musl-tools gcc-aarch64-linux-gnu

      - name: Configure cross-linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> $HOME/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> $HOME/.cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine binary name
        id: bin
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "name=acli.exe" >> $GITHUB_OUTPUT
            echo "src=target/${{ matrix.target }}/release/acli.exe" >> $GITHUB_OUTPUT
          else
            echo "name=acli" >> $GITHUB_OUTPUT
            echo "src=target/${{ matrix.target }}/release/acli" >> $GITHUB_OUTPUT
          fi

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="acli-${VERSION}-${{ matrix.target }}.tar.gz"
          cp "${{ steps.bin.outputs.src }}" acli
          tar -czf "${ARCHIVE}" acli LICENSE
          echo "ASSET=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME"
          $ARCHIVE = "acli-$VERSION-${{ matrix.target }}.zip"
          Copy-Item "${{ steps.bin.outputs.src }}" "acli.exe"
          Compress-Archive -Path "acli.exe","LICENSE" -DestinationPath $ARCHIVE
          "ASSET=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
